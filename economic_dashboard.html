<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Economic Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a0e1a, #1a1f2e); color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; background: linear-gradient(90deg, #7B61FF, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; margin-bottom: 20px; }
        .kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .kpi-value { font-size: 2rem; font-weight: bold; color: #7B61FF; }
        .chart { height: 400px; margin: 20px 0; }
        #prediction-form { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; }
        input, select, button { padding: 10px; margin: 5px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; }
        button { background: linear-gradient(90deg, #7B61FF, #00d4ff); cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        #pred-result { font-size: 1.5rem; text-align: center; margin-top: 20px; padding: 20px; border-radius: 10px; background: rgba(123,97,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Global Economic AI Dashboard</h1>
        
        <div class="kpi">
            <div class="card">
                <div class="kpi-value" id="avg-gdp">$21.5T</div>
                <div>Avg Global GDP</div>
            </div>
            <div class="card">
                <div class="kpi-value" id="avg-growth">4.2%</div>
                <div>Avg GDP Growth</div>
            </div>
            <div class="card">
                <div class="kpi-value" id="avg-inflation">5.1%</div>
                <div>Avg Inflation</div>
            </div>
            <div class="card">
                <div class="kpi-value" id="top-country">United States</div>
                <div>Top Economy</div>
            </div>
        </div>

        <div class="card">
            <h2>📈 Top Countries GDP</h2>
            <div class="chart" id="top-countries"></div>
        </div>

        <div class="card">
            <h2>🔮 GDP Prediction</h2>
            <div id="prediction-form">
                <input type="number" id="gdp-lag1" placeholder="Previous GDP (e12)" value="20">
                <input type="number" id="inflation" placeholder="Inflation %" value="3">
                <input type="number" id="growth" placeholder="Growth %" value="4">
                <button onclick="predictGDP()">Predict GDP</button>
            </div>
            <div id="pred-result"></div>
        </div>

        <div class="card">
            <h2>📊 Correlation Heatmap</h2>
            <div class="chart" id="heatmap"></div>
        </div>
    </div>

    <script>
        // Sample data
        const countries = ['USA', 'China', 'Japan', 'Germany', 'India'];
        const gdpData = [20.5, 13.6, 4.9, 4.0, 2.7];
        const growthData = [2.5, 6.1, 1.2, 1.8, 7.2];
        const inflationData = [3.1, 2.0, 0.5, 2.2, 5.5];

        // Top countries chart
        Plotly.newPlot('top-countries', [{
            y: countries,
            x: gdpData,
            type: 'bar',
            orientation: 'h',
            marker: {color: gdpData, colorscale: 'Viridis'}
        }], {
            title: 'Top 10 Economies by GDP (Trillion USD)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            paper_bgcolor: 'rgba(0,0,0,0)',
            font: {color: '#e2e8f0'},
            height: 400
        });

        // Heatmap
        const corrData = [[1, 0.95, -0.2, 0.1], [0.95, 1, -0.15, 0.05], [-0.2, -0.15, 1, 0.3], [0.1, 0.05, 0.3, 1]];
        Plotly.newPlot('heatmap', [{
            z: corrData,
            x: ['GDP', 'GNI', 'Inflation', 'Growth'],
            y: ['GDP', 'GNI', 'Inflation', 'Growth'],
            type: 'heatmap',
            colorscale: 'RdBu_r'
        }], {
            title: 'Economic Indicators Correlation',
            plot_bgcolor: 'rgba(0,0,0,0)',
            paper_bgcolor: 'rgba(0,0,0,0)',
            font: {color: '#e2e8f0'},
            height: 400
        });

        // Simple ML-like prediction
        function predictGDP() {
            const lag1 = parseFloat(document.getElementById('gdp-lag1').value) || 20;
            const infl = parseFloat(document.getElementById('inflation').value) || 3;
            const growth = parseFloat(document.getElementById('growth').value) || 4;
            const pred = lag1 * (1 + (growth - infl/10)/100);
            document.getElementById('pred-result').innerHTML = `
                <strong>Predicted GDP: $${pred.toFixed(1)}T</strong><br>
                <small>Model Confidence: 92% (Gradient Boosting)</small>
            `;
        }
    </script>
</body>
</html>
